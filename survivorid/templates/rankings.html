{% extends 'base.html' %}
{% block content %}<div class="glass-card p-4 mt-4"><h1 class="section-title">Rankings</h1><div class="table-responsive"><table class="table table-dark sid-table"><thead><tr><th>#</th><th>Player</th><th>Modo</th><th>K/D</th><th>ADR</th><th>Win</th><th>Score</th></tr></thead><tbody>{% for p in players %}<tr><td class="rank">{{ loop.index }}</td><td><a class="player-link" href="{{ url_for('player_profile', nickname=p.nickname) }}">{{ p.nickname }}</a></td><td>{{ p.best_mode }}</td><td>{{ p.kd }}</td><td>{{ p.avg_damage|int }}</td><td>{{ p.win_rate }}%</td><td class="text-warning fw-bold">{{ p.survivor_score }}</td></tr>{% endfor %}</tbody></table></div></div>{% endblock %}
