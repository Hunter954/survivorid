{% extends 'base.html' %}
{% block content %}<div class="row justify-content-center mt-4"><div class="col-lg-8"><div class="glass-card p-4"><h1 class="section-title">Configurações do site</h1><form method="post" enctype="multipart/form-data"><label>Nome do site</label><input name="site_name" value="{{ settings.get('site_name') }}" class="form-control mb-3"><label>Título da home</label><textarea name="hero_title" class="form-control mb-3">{{ settings.get('hero_title') }}</textarea><label>Subtítulo</label><textarea name="hero_subtitle" class="form-control mb-3">{{ settings.get('hero_subtitle') }}</textarea><label>Imagem hero/home</label><input type="file" name="hero_image" class="form-control mb-3"><label>Texto rodapé</label><textarea name="footer_text" class="form-control mb-3">{{ settings.get('footer_text') }}</textarea><button class="btn btn-warning fw-bold">Salvar</button></form></div></div></div>{% endblock %}
