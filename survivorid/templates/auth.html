{% extends 'base.html' %}
{% block content %}<div class="auth-wrap"><div class="glass-card auth-card p-4"><h1 class="section-title">{{ 'Entrar' if mode=='login' else 'Criar conta' }}</h1><form method="post">{% if mode=='register' %}<label>Nome</label><input name="name" class="form-control mb-3" required>{% endif %}<label>E-mail</label><input type="email" name="email" class="form-control mb-3" required><label>Senha</label><input type="password" name="password" class="form-control mb-3" required><button class="btn btn-warning w-100 fw-bold">{{ 'Entrar' if mode=='login' else 'Criar conta' }}</button></form><p class="mt-3 text-soft">{% if mode=='login' %}Não tem conta? <a href="{{ url_for('auth_register') }}">Criar conta</a>{% else %}Já tem conta? <a href="{{ url_for('auth_login') }}">Entrar</a>{% endif %}</p></div></div>{% endblock %}
