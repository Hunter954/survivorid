{% extends 'base.html' %}
{% block content %}<div class="glass-card p-4 mt-4"><h1 class="section-title">Medalhas</h1><form method="post" enctype="multipart/form-data" class="row g-2"><div class="col-md"><input name="name" class="form-control" placeholder="Nome" required></div><div class="col-md"><input name="tier" class="form-control" placeholder="GOLD/EPIC/RARE"></div><div class="col-md"><input name="icon" class="form-control" placeholder="bi-award-fill"></div><div class="col-md"><input type="file" name="image" class="form-control"></div><div class="col-12"><textarea name="description" class="form-control" placeholder="Descrição"></textarea></div><div class="col-12"><button class="btn btn-warning">Criar medalha</button></div></form><div class="row g-3 mt-3">{% for b in badges %}<div class="col-md-3"><div class="badge-card admin-badge">{% if b.image_url %}<img src="{{ url_for('static', filename=b.image_url) }}">{% else %}<i class="bi {{ b.icon }}"></i>{% endif %}<b>{{ b.name }}</b><small>{{ b.tier }}</small><p>{{ b.description }}</p></div></div>{% endfor %}</div></div>{% endblock %}
