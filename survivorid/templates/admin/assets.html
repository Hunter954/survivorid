{% extends 'base.html' %}
{% block content %}<div class="glass-card p-4 mt-4"><h1 class="section-title">Upload de imagens</h1><form method="post" enctype="multipart/form-data" class="row g-2"><div class="col-md"><input name="name" class="form-control" placeholder="Nome"></div><div class="col-md"><select name="kind" class="form-select"><option>general</option><option>badge</option><option>weapon</option><option>map</option><option>hero</option><option>avatar</option><option>banner</option></select></div><div class="col-md"><input type="file" name="file" class="form-control" required></div><div class="col-md-auto"><button class="btn btn-warning">Enviar</button></div></form><div class="row g-3 mt-3">{% for a in assets %}<div class="col-md-3"><div class="asset-card"><img src="{{ url_for('static', filename=a.file_path) }}"><b>{{ a.name }}</b><small>{{ a.kind }}</small><code>{{ a.file_path }}</code></div></div>{% endfor %}</div></div>{% endblock %}
